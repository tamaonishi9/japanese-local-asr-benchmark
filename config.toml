[audio]
sample_rate = 16000
channels = 1
dtype = "float32"

[output]
output_dir = "results"
copy_markdown_to_clipboard = false
save_markdown = true
save_csv = true
save_json = true

[profiles.small]
enabled = true
model_id = "small"
backend = "faster_whisper"
language = "ja"
device = "cpu"
compute_type = "int8"
cpu_threads = 4
num_workers = 1

[profiles.large_v3]
enabled = true
model_id = "large-v3"
backend = "faster_whisper"
language = "ja"
device = "cpu"
compute_type = "int8"
cpu_threads = 4
num_workers = 1

[profiles.kotoba_whisper_v2]
enabled = true
model_id = "kotoba-tech/kotoba-whisper-v2.0-faster"
backend = "faster_whisper"
language = "ja"
device = "cpu"
compute_type = "int8"
cpu_threads = 4
num_workers = 1

[profiles.moonshine_tiny_ja]
enabled = true
model_id = "moonshine/tiny-ja"
backend = "moonshine"
language = "ja"

# base-ja は onnx-community に存在するが decoder_model_merged.onnx 形式ではないため
# useful-moonshine-onnx の MoonshineOnnxModel では読み込めない。対応には adapter 書き直しが必要
[profiles.moonshine_base]
enabled = false
model_id = "moonshine/base"
backend = "moonshine"
language = "ja"
